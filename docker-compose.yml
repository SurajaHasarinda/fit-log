services:
  postgres:
    image: postgres:16-alpine
    container_name: fitlog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitlog_db
    ports:
      - "5432:5432"
    volumes:
      - fitlog_pgdata:/var/lib/postgresql/data

volumes:
  fitlog_pgdata:
