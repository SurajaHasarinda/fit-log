services:
  postgres:
    image: postgres:16-alpine
    container_name: fitlog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitlog_db
    ports:
      - "5432:5432"
    volumes:
      - fitlog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitlog-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9281:9281"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/fitlog_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

volumes:
  fitlog_pgdata:
