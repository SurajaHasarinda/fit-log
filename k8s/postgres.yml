apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: fit-log
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "fitlog_db"
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        healthCheck:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: pgdata
        emptyDir: {} # Use PersistentVolumeClaim in a production cluster
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: fit-log
spec:
  clusterIP: None # Headless service for the database
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
